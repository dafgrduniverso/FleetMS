<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Fleet MS{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>

  <style>
    body { background-color: #f5f6fa; }
    .sidebar {
      min-height: 100vh;
      background: #1e293b;
      color: #cbd5e1;
      width: 240px;
      position: fixed;
      top: 0; left: 0;
      display: flex;
      flex-direction: column;
      padding-top: 0;
      z-index: 100;
    }
    .sidebar .brand {
      background: #0f172a;
      padding: 1.2rem 1.5rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: .5px;
    }
    .sidebar a {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .65rem 1.5rem;
      color: #94a3b8;
      text-decoration: none;
      font-size: .92rem;
      border-left: 3px solid transparent;
      transition: background .15s, color .15s;
    }
    .sidebar a:hover, .sidebar a.active {
      background: #334155;
      color: #f1f5f9;
      border-left-color: #3b82f6;
    }
    .sidebar .nav-section {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #475569;
      padding: 1.2rem 1.5rem .3rem;
    }
    .sidebar .sidebar-footer {
      margin-top: auto;
      border-top: 1px solid #334155;
      padding: .8rem 1.5rem;
      font-size: .82rem;
    }
    .main-content {
      margin-left: 240px;
      padding: 2rem;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .badge-role {
      font-size: .7rem;
      padding: .25em .6em;
    }
    .stat-card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .table th { font-size: .8rem; text-transform: uppercase; letter-spacing: .5px; color: #64748b; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="brand"><i class="bi bi-truck me-2"></i>Fleet MS</div>

  <div class="nav-section">Overview</div>
  <a href="/dashboard" class="{% if request.url.path == '/dashboard' %}active{% endif %}">
    <i class="bi bi-speedometer2"></i> Dashboard
  </a>

  <div class="nav-section">Fleet</div>
  <a href="/vehicles" class="{% if '/vehicles' in request.url.path %}active{% endif %}">
    <i class="bi bi-car-front"></i> Vehicles
  </a>
  <a href="/drivers" class="{% if '/drivers' in request.url.path %}active{% endif %}">
    <i class="bi bi-person-badge"></i> Drivers
  </a>
  <a href="/maintenance" class="{% if '/maintenance' in request.url.path %}active{% endif %}">
    <i class="bi bi-tools"></i> Maintenance
  </a>
  <a href="/contracts" class="{% if '/contracts' in request.url.path %}active{% endif %}">
    <i class="bi bi-file-earmark-text"></i> Contracts
  </a>

  {% if user.role in ['ADMIN'] %}
  <div class="nav-section">Administration</div>
  <a href="/users" class="{% if '/users' in request.url.path %}active{% endif %}">
    <i class="bi bi-people"></i> Users
  </a>
  {% endif %}

  <div class="sidebar-footer">
    <div class="text-light fw-semibold">{{ user.name }}</div>
    <div class="text-secondary">{{ user.role }}</div>
    <div class="mt-2 d-flex gap-2">
      <a href="/users/profile" class="text-secondary text-decoration-none"><i class="bi bi-gear"></i> Profile</a>
      <a href="/logout" class="text-danger text-decoration-none ms-auto"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
  </div>
</nav>

<!-- Main content -->
<div class="main-content">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
